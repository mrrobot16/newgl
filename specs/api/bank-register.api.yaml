openapi: 3.1.0

info:
  title: Bank Register API
  version: 1.0.0

servers:
  - url: /api

paths:

  /accounts:
    get:
      summary: Get accounts

    post:
      summary: Create account

  /accounts/{accountId}/register:
    get:
      summary: Get register entries for account

  /transactions:
    post:
      summary: Create transaction

  /transactions/{transactionId}:
    get:
      summary: Get transaction details

  /transactions/{transactionId}/void:
    post:
      summary: Void transaction

  /transactions/{transactionId}/post:
    post:
      summary: Post transaction

  /transfers:
    post:
      summary: Create transfer transaction

  /deposits:
    post:
      summary: Create deposit transaction

  /expenses:
    post:
      summary: Create expense transaction