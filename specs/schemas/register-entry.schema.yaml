version: 1

entity: RegisterEntry

description: >
  Represents a row displayed in the bank register UI.

type: object

required:
  - id
  - accountId
  - transactionId
  - transactionType
  - date
  - status
  - runningBalance

properties:
  id:
    type: string
    format: uuid

  accountId:
    type: string
    format: uuid

  transactionId:
    type: string
    format: uuid

  transactionType:
    type: string
    enum:
      - CHECK
      - DEPOSIT
      - SALES_RECEIPT
      - RECEIVE_PAYMENT
      - BILL_PAYMENT
      - REFUND
      - EXPENSE
      - TRANSFER
      - JOURNAL_ENTRY

  refNumber:
    type: string

  payee:
    type: string

  memo:
    type: string

  payment:
    type: number
    minimum: 0

  deposit:
    type: number
    minimum: 0

  runningBalance:
    type: number

  postedAt:
    type: string
    format: date-time

  date:
    type: string
    format: date

  status:
    type: string
    enum:
      - DRAFT
      - POSTED
      - VOIDED
      - DELETED

  createdBy:
    type: string

  createdAt:
    type: string
    format: date-time

rules:
  - Register entry cannot contain both payment and deposit
  - Running balance is immutable once posted
  - Voided entries remain visible in audit history