version: 1

entity: ChartOfAccount

description: >
  Represents an account definition inside the
  Chart of Accounts (COA) hierarchy.

  Accounts define how financial transactions behave
  within the accounting ledger system.

type: object

required:
  - id
  - accountNumber
  - name
  - accountType
  - normalBalance
  - status
  - currency
  - createdAt

properties:

  id:
    type: string
    format: uuid

  accountNumber:
    type: string
    description: >
      Unique accounting number.

      Example:
      1000 = Cash
      2000 = Liabilities
      4000 = Revenue

  name:
    type: string

  description:
    type: string

  accountType:
    type: string
    enum:
      - ASSET
      - LIABILITY
      - EQUITY
      - REVENUE
      - EXPENSE

  accountSubtype:
    type: string
    enum:
      # ASSET
      - CASH
      - BANK
      - ACCOUNTS_RECEIVABLE
      - INVENTORY
      - FIXED_ASSET
      - OTHER_CURRENT_ASSET

      # LIABILITY
      - ACCOUNTS_PAYABLE
      - CREDIT_CARD
      - CURRENT_LIABILITY
      - LONG_TERM_LIABILITY
      - LOAN

      # EQUITY
      - OWNER_EQUITY
      - RETAINED_EARNINGS
      - OWNER_DRAW
      - OPENING_BALANCE_EQUITY

      # REVENUE
      - SALES
      - SERVICE_REVENUE
      - INTEREST_INCOME
      - OTHER_INCOME

      # EXPENSE
      - OPERATING_EXPENSE
      - PAYROLL_EXPENSE
      - RENT_EXPENSE
      - SOFTWARE_EXPENSE
      - TAX_EXPENSE
      - UTILITIES_EXPENSE
      - OTHER_EXPENSE

  normalBalance:
    type: string
    enum:
      - DEBIT
      - CREDIT

  reportingGroup:
    type: string

  parentAccountId:
    type: string
    format: uuid
    nullable: true

  hierarchyLevel:
    type: integer
    minimum: 0

  isParent:
    type: boolean
    default: false

  isSystemAccount:
    type: boolean
    default: false

  allowsManualPostings:
    type: boolean
    default: true

  currency:
    type: string
    default: USD

  openingBalance:
    type: number
    default: 0

  currentBalance:
    type: number
    default: 0

  availableBalance:
    type: number
    default: 0

  lastPostingDate:
    type: string
    format: date

  status:
    type: string
    enum:
      - ACTIVE
      - ARCHIVED
      - CLOSED

  tags:
    type: array
    items:
      type: string

  metadata:
    type: object
    additionalProperties: true

  createdBy:
    type: string

  createdAt:
    type: string
    format: date-time

  updatedAt:
    type: string
    format: date-time

  archivedAt:
    type: string
    format: date-time

  closedAt:
    type: string
    format: date-time

rules:

  - Account numbers must be unique

  - Parent accounts cannot directly receive postings unless explicitly enabled

  - Closed accounts cannot receive new transactions

  - System accounts cannot be deleted

  - Current balance is derived from ledger postings

  - Normal balance must match account type behavior

  - Child accounts inherit reporting hierarchy

  - Parent account balances aggregate child balances

  - Accounts participating in posted transactions cannot be physically deleted

relationships:

  parent:
    entity: ChartOfAccount
    field: parentAccountId

  children:
    entity: ChartOfAccount
    field: id

  postings:
    entity: LedgerPosting
    field: accountId

indexes:

  - accountNumber
  - accountType
  - accountSubtype
  - parentAccountId
  - reportingGroup
  - status

derivedValues:

  calculatedBalance:
    description: >
      System calculated balance derived from ledger postings.

  debitTotal:
    description: >
      Total debit postings associated with account.

  creditTotal:
    description: >
      Total credit postings associated with account.

audit:

  immutableBalanceHistory: true

  requiresAuditTrail: true

futureScope:

  - Multi currency balances
  - Consolidated reporting
  - Department accounting
  - Cost centers
  - Project accounting
  - Tax mapping
  - AI categorization
  - Budgeting
  - Forecasting