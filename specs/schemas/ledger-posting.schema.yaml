version: 1

entity: LedgerPosting

description: >
  Represents an immutable accounting posting generated
  from a transaction inside the double-entry ledger system.

  Ledger postings are the true source of accounting balances.

  Every financial transaction must generate
  one or more ledger postings.

type: object

required:
  - id
  - transactionId
  - accountId
  - entryType
  - amount
  - currency
  - postingDate
  - status
  - createdAt

properties:

  id:
    type: string
    format: uuid
    description: Unique posting identifier

  transactionId:
    type: string
    format: uuid
    description: Parent transaction identifier

  registerEntryId:
    type: string
    format: uuid
    description: Optional related register entry

  accountId:
    type: string
    format: uuid
    description: Account impacted by posting

  accountCode:
    type: string
    description: Snapshot of account code at posting time

  accountName:
    type: string
    description: Snapshot of account name at posting time

  entryType:
    type: string
    enum:
      - DEBIT
      - CREDIT

  amount:
    type: number
    minimum: 0.01
    description: Absolute posting amount

  currency:
    type: string
    default: USD

  exchangeRate:
    type: number
    default: 1

  postingDate:
    type: string
    format: date

  fiscalPeriod:
    type: string
    description: >
      Fiscal period snapshot.
      Example: 2026-05

  memo:
    type: string

  referenceNumber:
    type: string

  sourceDocumentType:
    type: string
    enum:
      - CHECK
      - DEPOSIT
      - SALES_RECEIPT
      - RECEIVE_PAYMENT
      - BILL_PAYMENT
      - REFUND
      - EXPENSE
      - TRANSFER
      - JOURNAL_ENTRY

  sourceDocumentId:
    type: string
    format: uuid

  reconciliationStatus:
    type: string
    enum:
      - UNRECONCILED
      - RECONCILED
    default: UNRECONCILED

  status:
    type: string
    enum:
      - PENDING
      - POSTED
      - VOIDED
      - REVERSED

  createdBy:
    type: string

  createdAt:
    type: string
    format: date-time

  postedAt:
    type: string
    format: date-time

  voidedAt:
    type: string
    format: date-time

  reversedAt:
    type: string
    format: date-time

rules:

  - Ledger postings are immutable after POSTED state

  - A ledger posting cannot be edited directly

  - Corrections require reversal postings

  - Every posting must belong to exactly one transaction

  - Posting amount must always be positive

  - Debit and credit totals inside a transaction must balance

  - Posted ledger entries affect account balances

  - Voided postings remain in audit history

  - Reversed postings must reference original postings

relations:

  belongsTo:
    - Transaction
    - Account

indexes:

  - transactionId
  - accountId
  - postingDate
  - fiscalPeriod
  - status

derivedValues:

  signedAmount:
    description: >
      System calculated signed value based on entry type.

      DEBIT  = positive
      CREDIT = negative

  balanceImpact:
    description: >
      Final balance impact depends on account category behavior.

audit:

  immutable: true

  requiresAuditTrail: true

futureScope:

  - Multi-currency postings
  - Tax posting support
  - Automated reconciliation
  - External banking synchronization
  - Posting batches
  - Fiscal year closing entries
  - AI anomaly detection