version: 1

entity: Transaction

description: >
  Represents the source accounting transaction
  that produces ledger postings and register entries.

type: object

required:
  - id
  - type
  - status
  - transactionDate
  - postings

properties:
  id:
    type: string
    format: uuid

  type:
    type: string
    enum:
      - CHECK
      - DEPOSIT
      - SALES_RECEIPT
      - RECEIVE_PAYMENT
      - BILL_PAYMENT
      - REFUND
      - EXPENSE
      - TRANSFER
      - JOURNAL_ENTRY

  status:
    type: string
    enum:
      - DRAFT
      - POSTED
      - VOIDED
      - DELETED

  transactionDate:
    type: string
    format: date

  referenceNumber:
    type: string

  memo:
    type: string

  payee:
    type: string

  postings:
    type: array
    minItems: 2
    items:
      type: object
      required:
        - accountId
        - type
        - amount

      properties:
        accountId:
          type: string
          format: uuid

        type:
          type: string
          enum:
            - DEBIT
            - CREDIT

        amount:
          type: number
          minimum: 0.01

  createdBy:
    type: string

  createdAt:
    type: string
    format: date-time

  updatedAt:
    type: string
    format: date-time

rules:
  - Total debits must equal total credits
  - Posted transactions become immutable
  - Deleted transactions are soft deleted only
  - Every transaction must produce ledger postings