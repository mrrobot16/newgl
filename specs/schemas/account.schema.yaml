version: 1

entity: Account

description: >
  Represents a financial or accounting account
  used inside the bank register and ledger system.

type: object

required:
  - id
  - code
  - name
  - category
  - status
  - currency
  - createdAt

properties:
  id:
    type: string
    format: uuid

  code:
    type: string
    description: Unique accounting code

  name:
    type: string

  category:
    type: string
    enum:
      - BANK
      - CREDIT_CARD
      - EQUITY
      - FIXED_ASSET
      - LONG_TERM_LIABILITY
      - OTHER_CURRENT_ASSET
      - OTHER_CURRENT_LIABILITY

  subtype:
    type: string
    description: Optional subtype classification

  currency:
    type: string
    default: USD

  openingBalance:
    type: number
    minimum: 0

  currentBalance:
    type: number

  allowManualEntries:
    type: boolean
    default: true

  status:
    type: string
    enum:
      - ACTIVE
      - ARCHIVED
      - CLOSED

  createdAt:
    type: string
    format: date-time

  updatedAt:
    type: string
    format: date-time

  archivedAt:
    type: string
    format: date-time

rules:
  - Account code must be unique
  - Closed accounts cannot receive new transactions
  - Archived accounts remain readable
  - Current balance is system calculated